# Initially fitted by tailor on 2026-03-07
license: MIT

repository:
  description: "Experimental R&D prototype for OSGeo website - This is NOT the official site"
  has_wiki: true
  has_discussions: false
  has_projects: true
  has_issues: true
  allow_merge_commit: true
  allow_squash_merge: true
  allow_rebase_merge: true
  squash_merge_commit_title: COMMIT_OR_PR_TITLE
  squash_merge_commit_message: COMMIT_MESSAGES
  merge_commit_title: MERGE_MESSAGE
  merge_commit_message: PR_TITLE
  delete_branch_on_merge: false
  allow_update_branch: false
  allow_auto_merge: false
  web_commit_signoff_required: false
  private_vulnerability_reporting_enabled: false
  vulnerability_alerts_enabled: true
  automated_security_fixes_enabled: true
  default_workflow_permissions: read
  can_approve_pull_request_reviews: false

labels:
  - name: bug
    color: d20f39
    description: "Something isn't working"

  - name: documentation
    color: 04a5e5
    description: Documentation improvement

  - name: duplicate
    color: 8839ef
    description: Already exists

  - name: enhancement
    color: 1e66f5
    description: New feature request

  - name: good first issue
    color: 40a02b
    description: Good for newcomers

  - name: help wanted
    color: 179299
    description: Extra attention needed

  - name: invalid
    color: e64553
    description: Not valid or relevant

  - name: question
    color: 7287fd
    description: Needs more information

  - name: wontfix
    color: dc8a78
    description: Will not be worked on

  - name: dependencies
    color: fe640b
    description: Dependency update

  - name: github_actions
    color: ea76cb
    description: GitHub Actions update

  - name: hacktoberfest-accepted
    color: df8e1d
    description: Hacktoberfest contribution

swatches:
  - source: .github/workflows/tailor.yml
    destination: .github/workflows/tailor.yml
    alteration: always

  - source: .github/dependabot.yml
    destination: .github/dependabot.yml
    alteration: first-fit

  - source: .github/FUNDING.yml
    destination: .github/FUNDING.yml
    alteration: first-fit

  - source: .github/ISSUE_TEMPLATE/bug_report.yml
    destination: .github/ISSUE_TEMPLATE/bug_report.yml
    alteration: always

  - source: .github/ISSUE_TEMPLATE/feature_request.yml
    destination: .github/ISSUE_TEMPLATE/feature_request.yml
    alteration: always

  - source: .github/ISSUE_TEMPLATE/config.yml
    destination: .github/ISSUE_TEMPLATE/config.yml
    alteration: first-fit

  - source: .github/pull_request_template.md
    destination: .github/pull_request_template.md
    alteration: always

  - source: SECURITY.md
    destination: SECURITY.md
    alteration: always

  - source: CODE_OF_CONDUCT.md
    destination: CODE_OF_CONDUCT.md
    alteration: always

  - source: CONTRIBUTING.md
    destination: CONTRIBUTING.md
    alteration: always

  - source: SUPPORT.md
    destination: SUPPORT.md
    alteration: always

  - source: justfile
    destination: justfile
    alteration: first-fit

  - source: flake.nix
    destination: flake.nix
    alteration: first-fit

  - source: .gitignore
    destination: .gitignore
    alteration: first-fit

  - source: .envrc
    destination: .envrc
    alteration: first-fit

  - source: .tailor/config.yml
    destination: .tailor/config.yml
    alteration: always

  - source: .github/workflows/tailor-automerge.yml
    destination: .github/workflows/tailor-automerge.yml
    alteration: triggered
