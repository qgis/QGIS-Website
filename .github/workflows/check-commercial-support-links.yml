# This workflow scrapes the latest show episodes and commits the new episode and data
# files to the repo.

name: '🧹 Sanitize commercial support links and commit'
on:
  schedule:
    - cron: '0 0 * * 0'  # At midnight UTC every Sunday
  workflow_dispatch:   # Allows you to run this workflow manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'qgis'
    steps:
    - name: '🛒 Checkout QGIS Website'
      uses: actions/checkout@v6
      with:
        ref: main
        path: ./qgis-website
        submodules: recursive

    - name: '🐍 Setup Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
        cache: "pipenv"

    - name: '🚸Install Python deps'
      run: |
        cd ./qgis-website
        pip install pipenv && pipenv install -r REQUIREMENTS.txt && pipenv sync --bare
        pipenv run pip freeze

    - name: '⚙️ Check commercial support links'
      run: |
        cd ./qgis-website
        pipenv run ./scripts/sanitize_commercial_supports.py

    - name: '⬇️ Pull latest changes before commit'
      run: |
        cd ./qgis-website
        # Other scheduled jobs commit to main too, and one of them may have
        # pushed while this job was running. Refresh our checkout first so the
        # commit below is not rejected as a non fast forward push.
        if ! git diff --quiet || ! git diff --cached --quiet; then
          git stash push -u -m "Auto stash before pull"
          git pull --rebase origin main || echo "Nothing new to pull"
          git stash pop || echo "Nothing to pop"
        else
          git pull --rebase origin main || echo "Nothing new to pull"
        fi

    - name: '✉️ Commit'
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: 'Commercial support links sanitized and committed via a GitHub Action.'
        repository: ./qgis-website
        # push_options: --force
