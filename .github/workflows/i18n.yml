name: 🌐 i18n Automation

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily at 04:00 UTC (after tx-coverage at 03:00)
  workflow_dispatch:  # Allow manual triggering

jobs:
  i18n:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.139.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r REQUIREMENTS.txt

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Transifex CLI
        run: |
          mkdir -p $HOME/bin
          curl -o- https://raw.githubusercontent.com/transifex/cli/master/install.sh | bash
          # Move tx binary to a persistent location and add to PATH
          mv tx $HOME/bin/
          chmod +x $HOME/bin/tx
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Extract messages
        run: make messages-extract

      - name: Push to Transifex
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: |
          echo "password = $TX_TOKEN
          token = $TX_TOKEN
          username = api" > ~/.transifexrc
          make txpush

      - name: Pull translations
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: make txpull

      - name: Compile translations
        run: make messages-compile

      - name: Generate translated content
        run: make generate-translations

      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code content-translated/* i18n/* config.toml || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-translated/* i18n/* config.toml
          git commit -m "🤖 Update translations [skip ci]"
          git push
      
      - name: Report status
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "ℹ️ No changes detected in translations. Workflow completed successfully."
