# This workflow updates the feeds, members list, and contributors stats.

name: ⚒️ Scrape and commit
on:
  schedule:
    - cron:  '0 0,12 * * *'  # At midnight & noon UTC
  workflow_dispatch:   # Allows you to run this workflow manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'qgis'
    steps:
    - name: '🛒 Checkout QGIS Website'
      uses: actions/checkout@v6
      with:
        ref: main
        path: ./qgis-website

    - name: '🐍 Setup Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        architecture: 'x64'
        cache: "pipenv"

    - name: '🚸Install Python deps'
      run: |
        cd ./qgis-website
        pip install pipenv && pipenv install -r REQUIREMENTS.txt && pipenv sync --bare
        pipenv run pip freeze

    - name: '🗞️ Fetch Feed Content'
      run: |
        cd ./qgis-website
        pipenv run pip freeze
        pipenv run ./fetch_feeds.py

    - name: '⚙️ Update Hub Maps'
      run: |
        cd ./qgis-website
        pipenv run ./scripts/hub_images_harvest.py

    - name: '🏢 Update Contributing Organizations'
      run: |
        cd ./qgis-website
        pipenv run ./scripts/update_contributing_orgs.py

    - name: '🧑‍💻 Update GitHub Contributors'
      run: |
        cd ./qgis-website
        pipenv run ./scripts/update_individual_contributors.py

    - name: '⬇️ Pull latest changes before commit'
      run: |
        cd ./qgis-website
        # Stash any changes, pull with rebase, then pop the stash
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Changes detected, stashing..."
          git stash push -u -m "Auto-stash before pull"
          git pull --rebase origin main || echo "No upstream changes to pull"
          git stash pop || echo "No stash to pop or conflicts resolved"
        else
          echo "No changes to stash, pulling directly..."
          git pull --rebase origin main || echo "No upstream changes to pull"
        fi

    - name: '✉️ Commit'
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: 'Funders scraped and committed via a GitHub Action.'
        repository: ./qgis-website
