# This workflow updates the GitHub Sponsors list in the content/funding/donate/github-sponsors.md file.
name: 💖 Update the GitHub Sponsors page and commit
on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  schedule:
    - cron: '0 0,12 * * *'  # At midnight & noon UTC
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'qgis'
    steps:
      - name: '🛎️ Checkout'
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: '💖 Generate Sponsors'
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.PAT }}
          file: 'content/funding/donate/github-sponsors.md'
          organization: true
          active-only: false
          template: |
            <a class="rich-list third mr-2 mb-2" href="https://github.com/{{{ login }}}" target="_blank">
              <div class="listcont external-link">
                {{{ name }}} - {{{ login }}}
              </div>
            </a>
    
      - name: '⬇️ Pull latest changes before commit'
        run: |
          # Other scheduled jobs commit to main too, and one of them may have
          # pushed while this job was running. Refresh our checkout first so the
          # commit below is not rejected as a non fast forward push.
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git stash push -u -m "Auto stash before pull"
            git pull --rebase origin main || echo "Nothing new to pull"
            git stash pop || echo "Nothing to pop"
          else
            git pull --rebase origin main || echo "Nothing new to pull"
          fi

      - name: '✉️ Commit'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'GitHub Sponsors updated and committed via a GitHub Action.'
