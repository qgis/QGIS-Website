<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920px" height="900px" viewBox="0 0 1920 900" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>OSGeo Compass Wide</title>
    <desc>Wide triangular brand element for OSGeo</desc>
    <defs></defs>
    <g id="compass-wide" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Small dark teal triangle on left edge -->
        <polygon id="teal-accent" fill="#00383F" points="0 0 0 900 200 900"></polygon>
        <!-- Large green triangle sweeping across -->
        <polygon id="green-main" fill="#4CAF5B" points="0 0 960 900 1920 900"></polygon>
    </g>
</svg>
