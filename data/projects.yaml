incubated:
  # Desktop Applications
  - id: "qgis"
    name: "QGIS"
    tagline: "The leading Free and Open Source Desktop GIS"
    description: |
      QGIS is the leading Free and Open Source Desktop GIS. It allows you to create, edit, visualise, analyse and publish geospatial information on Windows, Mac OS, Linux, BSD and Android (via the QField app). We also provide an OGC Web Server application, a web browser client and developer libraries. The QGIS project is under very active development by an enthusiastic and engaged developer community with good mechanisms for help via stack exchange, mailing lists and (optionally) through a global network of commercial support providers.
    category: "desktop"
    status: "incubated"
    logo: ""
    screenshot: "/img/projects/qgis-interface.png"
    hero_image: "/img/projects/qgis-hero.png"
    doi: "10.5281/zenodo.6139224"

    # Links
    url: "http://qgis.org"
    repo: "http://github.com/qgis/QGIS"
    docs: "http://docs.qgis.org"
    download: "http://download.qgis.org"
    issues: "https://issues.qgis.org/projects/qgis/issues/"
    demo: "https://qgis.org/en/site/about/screenshots.html"

    # Communication
    communication:
      blog: "http://blog.qgis.org"
      planet_rss: "https://plugins.qgis.org/planet/feed/rss/"
      mailing_lists: "https://qgis.org/en/site/getinvolved/mailinglists.html"

    # End-User Resources
    end_user_resources:
      - name: "Download Software"
        url: "http://download.qgis.org"
        icon: "fa-solid fa-download"
      - name: "Demo"
        url: "https://qgis.org/en/site/about/screenshots.html"
        icon: "fa-solid fa-images"
      - name: "Issue Trackers"
        url: "https://issues.qgis.org/projects/qgis/issues/"
        icon: "fa-solid fa-bug"
      - name: "Source Code"
        url: "http://github.com/qgis/QGIS"
        icon: "fa-brands fa-github"
      - name: "Contributors"
        url: "https://qgis.org/en/site/getinvolved/governance/index.html"
        icon: "fa-solid fa-users"
      - name: "News"
        url: "https://qgis.org/en/site/getinvolved/governance/index.html#qgis-sketches"
        icon: "fa-solid fa-newspaper"
      - name: "Meetings / events"
        url: "https://qgis.org/en/site/getinvolved/meetings/developer/index.html"
        icon: "fa-solid fa-calendar"
      - name: "Sponsors"
        url: "https://qgis.org/en/site/about/sustaining_members.html"
        icon: "fa-solid fa-heart"
      - name: "Mailing list(s)"
        url: "https://qgis.org/en/site/getinvolved/mailinglists.html"
        icon: "fa-solid fa-envelope"
      - name: "Documentation"
        url: "http://docs.qgis.org"
        icon: "fa-solid fa-book"

    # Overview & Components
    overview: |
      QGIS is a professional GIS application and developer platform. QGIS is built on top of and proud to be itself Free and Open Source Software.
    components:
      - name: "QGIS Desktop"
        description: "Powerful desktop GIS software to create, edit, visualise, analyse and publish geospatial information."
      - name: "QGIS Server & Web Client"
        description: "Publish your QGIS projects and layers as OGC compatible WMS and WFS services."
    platform_info: "QGIS runs on Linux, Unix, Mac OS and Windows and supports numerous vector, raster, and database formats and functionalities."

    # Features
    features_intro: "QGIS provides a continuously growing number of capabilities provided by core functions and plugins."
    features_summary: "You can visualize, manage, edit, analyse data, and design maps."
    features:
      - name: "Interoperability"
        description: "support for numerous file formats and databases as well as web services."
      - name: "Customizability"
        description: "freedom to tailor the application to your needs, from custom data input forms to personalized user interfaces and workflows."
      - name: "Extensibility"
        description: "a C++ core and Python support provide the framework for everything from quick scripts to novel stand-alone applications based on the QGIS API."

    # Community
    community: |
      QGIS is developed by a team of dedicated volunteers and organisations. We strive to be a welcoming community for people of all race, creed, gender and walks of life.
    users_info: |
      QGIS users are found in various fields, including: government, education, planning, engineering, NGOs, military and research. User Groups are regional organizations that run user meetings, provide a platform for common interestes and coordinate development, taking into account regional/national standards and requirements.
    developer_meetings: "Developer meetings are a great opportunity to meet community members in person."
    international: |
      QGIS is a world-wide community. We are proud of our international team which enables us to provide an application that is translated into dozens of languages.
    support_info: |
      The number of regional user groups is constantly growing. User groups can be found on all continents. This means that both community as well as professional commercial support options are available world-wide.

    # Implemented Standards
    standards:
      - "Catalogue Service for the Web (CSW)"
      - "Web Coverage Service (WCS)"
      - "Web Feature Service (WFS)"
      - "Web Feature Service - Transactional (WFS-T)"
      - "Web Map Service (WMS)"

    # Specs
    specs: |
      Create, edit and write a multitude of GeoSpatial formats. Design top notch maps using our rich set of cartographic options. Perform spatial analysis on your vector and raster data. Generate professional maps and map series. Share your maps online with an exact match to how it looks on your desktop. Participate in a huge community of plugins that cater for many specialized use cases.

    # Related
    based_on:
      - name: "GDAL"
        url: "/projects/gdal/"
    similar_projects:
      - name: "GRASS"
        url: "/projects/grass/"
      - name: "gvSIG Desktop"
        url: "/projects/gvsig/"
    migrate_from:
      - "ArcMap"

    # Service Providers (Core Contributors)
    service_providers:
