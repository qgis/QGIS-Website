      - name: "Oslandia"
        url: "https://oslandia.com"
      - name: "Lutra Consulting"
        url: "https://lutraconsulting.co.uk"

    # Technical
    languages:
      - "C++"
      - "Python"
    license: "GPL Version 2 or greater"

